name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-example-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglfw3 libosmesa6 libopenblas0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mujoco "gymnasium[mujoco]" black isort flake8

      - name: Black check
        run: black --check .

      - name: Isort check
        run: isort --check-only .

      - name: Flake8 check
        run: flake8 .

      - name: Run example smoke test from bin
        env:
          MUJOCO_GL: osmesa
        run: |
          chmod +x bin/run_all_examples.sh
          ./bin/run_all_examples.sh
